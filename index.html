<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Operation Board - Arknights Event Squad Hub</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <aside class="rail" aria-label="イベントナビゲーション">
        <div class="brand">
          <span class="brand-mark">OB</span>
          <div>
            <strong>Operation Board</strong>
            <span>Event squad database</span>
          </div>
        </div>

        <section class="panel current-event">
          <div class="section-label">開催中イベント</div>
          <h1 id="eventTitle">聖山降臨1101</h1>
          <p id="eventDescription">周回、勲章加工、少人数、低レア。投稿編成をステージ単位で探せます。</p>
          <div class="event-meta">
            <span id="eventDaysLeft">残り 11日</span>
            <span id="postCount">投稿 248</span>
          </div>
          <div class="event-picker">
            <label>
              <span>カテゴリ</span>
              <select id="eventCategory">
                <option value="recent">最近のイベント</option>
                <option value="side">サイドストーリー</option>
                <option value="mini">ショートイベント</option>
                <option value="main">メインテーマ</option>
                <option value="all">すべて</option>
              </select>
            </label>
            <label>
              <span>イベント切替</span>
              <select id="eventSelect"></select>
            </label>
          </div>
        </section>

        <section class="panel stage-list" id="stageList">
          <div class="section-label">ステージ</div>
        </section>
      </aside>

      <section class="workspace">
        <header class="topbar">
          <div>
            <div class="section-label">検索条件</div>
            <h2 id="stageTitle">OS-1 攻略編成</h2>
            <p class="stage-subtitle" id="stageSubtitle">夕景に影あり</p>
          </div>
          <button class="primary-action" id="openComposer" type="button">編成を投稿</button>
        </header>

        <section class="search-strip" aria-label="編成検索">
          <label>
            <span>キーワード</span>
            <input id="searchInput" type="search" placeholder="例: 放置、ムリナール、低レア" />
          </label>
          <label>
            <span>並び順</span>
            <select id="sortSelect">
              <option value="saved">保存数</option>
              <option value="clear">成功報告</option>
              <option value="new">新着</option>
            </select>
          </label>
          <label class="checkbox-label">
            <input id="ownedOnly" type="checkbox" />
            <span>自分の手持ちで組める編成だけ</span>
          </label>
        </section>

        <section class="content-grid">
          <div class="main-column">
            <div class="filter-tabs" aria-label="タグフィルター">
              <button class="tag-filter active" data-tag="all">すべて</button>
              <button class="tag-filter" data-tag="周回">周回</button>
              <button class="tag-filter" data-tag="放置">放置</button>
              <button class="tag-filter" data-tag="低レア">低レア</button>
              <button class="tag-filter" data-tag="少人数">少人数</button>
              <button class="tag-filter" data-tag="勲章">勲章</button>
            </div>
            <div class="squad-list" id="squadList"></div>
          </div>

          <aside class="insight-column">
            <section class="panel stats-card">
              <div class="section-label">このステージの傾向</div>
              <div class="stat-row">
                <strong id="clearRate">92%</strong>
                <span>投稿編成の成功報告率</span>
              </div>
              <div class="stat-row">
                <strong id="avgOps">7.3</strong>
                <span>平均採用人数</span>
              </div>
            </section>

            <section class="panel">
              <div class="section-heading">
                <div>
                  <div class="section-label">採用率</div>
                  <h3>人気オペレーター</h3>
                </div>
                <span id="operatorCount">48名</span>
              </div>
              <div class="operator-ranking" id="operatorRanking"></div>
            </section>

            <section class="panel owned-panel">
              <div class="section-label">手持ちメモ</div>
              <p>未所持として扱うオペレーターを外すと、組める編成だけに絞り込めます。</p>
              <div class="owned-controls" aria-label="手持ちメモの分類">
                <label>
                  <span>レアリティ</span>
                  <select id="ownedRarityFilter">
                    <option value="★6">★6</option>
                    <option value="★5">★5</option>
                    <option value="★4">★4</option>
                    <option value="★3">★3</option>
                    <option value="★2">★2</option>
                    <option value="★1">★1</option>
                    <option value="その他">その他</option>
                    <option value="all">すべて</option>
                  </select>
                </label>
                <label>
                  <span>職業</span>
                  <select id="ownedProfessionFilter">
                    <option value="all">すべて</option>
                    <option value="先鋒">先鋒</option>
                    <option value="前衛">前衛</option>
                    <option value="重装">重装</option>
                    <option value="狙撃">狙撃</option>
                    <option value="術師">術師</option>
                    <option value="医療">医療</option>
                    <option value="補助">補助</option>
                    <option value="特殊">特殊</option>
                    <option value="その他">その他</option>
                  </select>
                </label>
              </div>
              <div class="owned-summary" id="ownedSummary"></div>
              <div class="owned-grid" id="ownedGrid"></div>
            </section>
          </aside>
        </section>
      </section>
    </main>

    <dialog class="composer" id="composer">
      <form method="dialog" class="composer-form" id="composerForm">
        <div class="composer-head">
          <div>
            <div class="section-label">投稿</div>
            <h2>イベント編成を登録</h2>
          </div>
          <button class="icon-button" id="closeComposer" aria-label="閉じる" type="button">×</button>
        </div>
        <label>
          <span>投稿者名</span>
          <input id="authorField" placeholder="未入力なら匿名ドクター" />
        </label>
        <label>
          <span>編成タイトル</span>
          <input id="titleField" placeholder="未入力ならステージとタグから自動作成" />
        </label>
        <label>
          <span>採用オペレーター</span>
          <input id="operatorsField" placeholder="例: ホシグマで検索して候補を選択" autocomplete="off" />
        </label>
        <div class="composer-assist">
          <div class="selected-pool" id="selectedOperators" aria-live="polite"></div>
          <div class="suggestion-pool" id="operatorSuggestions"></div>
        </div>
        <div>
          <span>タグ</span>
          <div class="tag-picker" id="tagPicker">
            <button type="button" data-tag="周回">周回</button>
            <button type="button" data-tag="放置">放置</button>
            <button type="button" data-tag="低レア">低レア</button>
            <button type="button" data-tag="少人数">少人数</button>
            <button type="button" data-tag="勲章">勲章</button>
            <button type="button" data-tag="強襲">強襲</button>
            <button type="button" data-tag="初心者向け">初心者向け</button>
          </div>
          <label class="custom-tag-label">
            <span>追加タグ</span>
            <input id="tagsField" placeholder="例: 6人、高速、安定" />
          </label>
        </div>
        <label>
          <span>攻略メモ</span>
          <textarea id="noteField" rows="4" placeholder="配置順、スキルタイミング、代替候補など"></textarea>
        </label>
        <label>
          <span>攻略リンク</span>
          <input id="linkField" type="url" placeholder="https://youtu.be/..." />
        </label>
        <button class="primary-action wide" id="submitComposer" value="default" type="submit">投稿する</button>
      </form>
    </dialog>

    <div class="toast" id="toast" role="status" aria-live="polite"></div>
    <script src="./config.js"></script>
    <script src="./operators.js"></script>
    <script src="./operator-metadata.js"></script>
    <script src="./operator-icons.js"></script>
    <script src="./event-master.js"></script>
    <script src="./skills.js"></script>
    <script src="./modules.js"></script>
    <script src="./app.js"></script>
  </body>
</html>
